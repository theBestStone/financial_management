# SPA 静态站点（图片已打包在 public/assets，无需 CDN 代理）

location /efmac-api/ {
    proxy_pass https://pcweb.xiehuiyi.com/;
    proxy_set_header Referer https://www.efmac.net/;
    proxy_set_header Origin https://www.efmac.net;
    proxy_set_header Host pcweb.xiehuiyi.com;
}

location / {
    root /var/www/financial_management/dist;
    try_files $uri $uri/ /index.html;
}
