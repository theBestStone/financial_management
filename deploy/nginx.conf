# 生产环境静态站点：将 /pcweb-cdn 代理到协会易 CDN，并注入官网 Referer 以通过防盗链
# 将本文件 include 到 server 块，或把 location 段合并进现有配置

location /pcweb-cdn/ {
    proxy_pass https://pcweb.shanghuiyidisk.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host pcweb.shanghuiyidisk.com;
    proxy_set_header Referer https://www.efmac.net/;
    proxy_set_header Origin https://www.efmac.net;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "public, max-age=86400";
}

# SPA 路由回退（Vite build 产物在 /var/www/financial_management/dist）
location / {
    root /var/www/financial_management/dist;
    try_files $uri $uri/ /index.html;
}
